services:
  - type: web
    name: sigp-backend
    env: docker
    rootDir: sigp-backend
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sigp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*" # To be restricted in production
      - key: BCRYPT_SALT_ROUNDS
        value: 12

databases:
  - name: sigp-db
    databaseName: sigp_db
    user: sigp_user
    plan: free
    postgresMajorVersion: 15
